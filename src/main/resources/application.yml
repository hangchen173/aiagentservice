server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: intern
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intern_db}
    username: ${SPRING_DATASOURCE_USERNAME:intern_user}
    password: ${SPRING_DATASOURCE_PASSWORD:intern_pass}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY:nexusmind-demo-key}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${QWEN_MODEL:qwen3.7-plus}
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 9MB
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
    validate-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.intern.model
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false

nexusmind:
  jwt:
    secret: ${JWT_SECRET:nexusmind-local-secret-change-me}
    ttl-seconds: ${JWT_TTL_SECONDS:86400}
  ai:
    dashscope-api-key: ${DASHSCOPE_API_KEY:}
    default-model: ${QWEN_MODEL:qwen3.7-plus}
    vision-model: ${QWEN_VISION_MODEL:qwen-vl-max}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:60}
    max-tokens-limit: ${AI_MAX_TOKENS_LIMIT:600}
    http:
      connect-timeout-seconds: ${AI_HTTP_CONNECT_TIMEOUT_SECONDS:5}
      read-timeout-seconds: ${AI_HTTP_READ_TIMEOUT_SECONDS:90}
    executor:
      core-size: ${AI_EXECUTOR_CORE_SIZE:4}
      max-size: ${AI_EXECUTOR_MAX_SIZE:8}
      queue-capacity: ${AI_EXECUTOR_QUEUE_CAPACITY:40}
  chat:
    image-storage-path: ${CHAT_IMAGE_STORAGE_PATH:./data/chat-images}
    image-max-bytes: ${CHAT_IMAGE_MAX_BYTES:8388608}
  rate-limit:
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    max-requests: ${RATE_LIMIT_MAX_REQUESTS:120}
    redis-enabled: ${RATE_LIMIT_REDIS_ENABLED:false}
  websocket:
    redis-pubsub-enabled: ${WEBSOCKET_REDIS_PUBSUB_ENABLED:false}
