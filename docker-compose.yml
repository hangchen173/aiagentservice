services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusmind-postgres
    environment:
      POSTGRES_DB: intern_db
      POSTGRES_USER: intern_user
      POSTGRES_PASSWORD: intern_pass
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intern_user -d intern_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexusmind-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/intern_db
      SPRING_DATASOURCE_USERNAME: intern_user
      SPRING_DATASOURCE_PASSWORD: intern_pass
      REDIS_HOST: redis
      WEBSOCKET_REDIS_PUBSUB_ENABLED: "true"
      RATE_LIMIT_REDIS_ENABLED: "true"
    ports:
      - "8080-8081:8080"
    volumes:
      - chat-images:/app/data/chat-images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusmind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  chat-images:
